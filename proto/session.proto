syntax = "proto3";
package kf2;

import "common.proto";

// Lifecycle / meta-management of sessions.
service SessionManagerService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
}

// Actions performed *within* an existing session: provider configuration
// today, and host queue mutations etc. in the future.
service SessionService {
  rpc ConfigureProvider(ConfigureProviderRequest)
      returns (ConfigureProviderResponse);
  rpc UnconfigureProvider(UnconfigureProviderRequest)
      returns (UnconfigureProviderResponse);
  rpc GetProviderStatus(GetProviderStatusRequest)
      returns (GetProviderStatusResponse);
  rpc ListConfiguredProviders(ListConfiguredProvidersRequest)
      returns (ListConfiguredProvidersResponse);
}

message Session {
  string id = 1;
  string created_at = 2;
  string updated_at = 3;
}

message CreateSessionRequest {}
message CreateSessionResponse { Session session = 1; }

message GetSessionRequest { string id = 1; }
message GetSessionResponse { Session session = 1; }

message ListSessionsRequest {}
message ListSessionsResponse { repeated Session sessions = 1; }

message DeleteSessionRequest { string id = 1; }
message DeleteSessionResponse { bool deleted = 1; }

// --- Per-session provider configuration ---

message ConfigureProviderRequest {
  string session_id = 1;
  ProviderType provider = 2;
  string username = 3;
  string password = 4;
}
message ConfigureProviderResponse {}

message UnconfigureProviderRequest {
  string session_id = 1;
  ProviderType provider = 2;
}
message UnconfigureProviderResponse {
  bool removed = 1;
}

message ProviderStatus {
  ProviderType provider = 1;
  bool is_configured = 2;
  optional string username = 3;
}

message GetProviderStatusRequest {
  string session_id = 1;
  ProviderType provider = 2;
}
message GetProviderStatusResponse {
  ProviderStatus status = 1;
}

message ListConfiguredProvidersRequest {
  string session_id = 1;
}
message ListConfiguredProvidersResponse {
  repeated ProviderStatus providers = 1;
}
